<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Torcedores</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <form action="./resultado.html">
        <h1>Cadastro de Torcedores</h1>
        <img class="logo" src="../assets/imagens/federacao-cabo-verdiana-de-futebol.png" alt="Logo do time">

        <label class="textlabel">Nome:</label>
        <input id="nome" class="campotexto" type="text" name="nome" placeholder="Nome Completo" required>

        <label class="textlabel">Data de Nascimento:</label> 
        <input id="data_nascimento" class="campotexto" type="date" name="data_nascimento" required>

        <label class="textlabel">Email:</label>
        <input id="email" class="campotexto" type="email" name="email" placeholder="Insira seu email" required>

        <label class="selectlabel">País:</label>
        <select id="select_pais" class="select">
            <option value="brasil">Brasil</option>
            <option value="cabo_verde" selected>Cabo Verde</option>
            <option value="espanha">Espanha</option>
            <option value="portugal">Portugal</option>
            <option value="noruega">Noruega</option>
            <option value="inglaterra">Inglaterra</option>
            <option value="marrocos">Marrocos</option>
            <option value="haiti">Haiti</option>
            <option value="escocia">Escócia</option>
            <option value="alemanha">Alemanha</option>
            <option value="egito">Egito</option>
            <option value="outros">Outros</option>
        </select>

        <label class="selectlabel">Jogador Favorito:</label>
        <select id="select_jogador" class="select">
            <option value="vozinha">Vozinha</option>
            <option value="logan_costa">Logan Costa</option>
            <option value="mario_rosa">Mário Rosa</option>
            <option value="cj_dos_santos">CJ dos Santos</option>
            <option value="ianique_dos_santos_tavares">Ianique dos Santos Tavares</option>
            <option value="diney">Diney</option>
            <option value="roberto_lopes">Roberto Lopes</option>
            <option value="sidny_lopes_cabral">Sidny Lopes Cabral</option>
            <option value="steven_moreira">Steven Moreira</option>
            <option value="wagner_pina">Wagner Pina</option>
            <option value="kelvin_pires">Kelvin Pires</option>
            <option value="kevina_pina">Kevina Pina</option>
            <option value="joao_paulo_fernandes">João Paulo Fernandes</option>
            <option value="jamiro_monteiro">Jamiro Monteiro</option>
            <option value="garry_rodrigues">Garry Rodrigues</option>
            <option value="deroy_duarte">Deroy Duarte</option>
            <option value="laros_duarte">Laros Duarte</option>
            <option value="yannick_semedo">Yannick Semedo</option>
            <option value="telmo_arcanjo">Telmo Arcanjo</option>
            <option value="nuno_da_costa">Nuno da Costa</option>
            <option value="jovane_cabral">Jovane Cabral</option>
            <option value="gilson_tavares">Gilson Tavares</option>
            <option value="willy_semedo">Willy Semedo</option>
            <option value="dailon_livramento">Dailon Livramento</option>
            <option value="ryan_mendes">Ryan Mendes</option>
            <option value="helio_varela">Hélio Varela</option>
        </select>
       
        <button id="enviar" type="submit">Enviar</button>
    </form>

</body>
</html>
